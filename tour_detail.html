<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tour Package — Upupa Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:#111;background:#fff;-webkit-font-smoothing:antialiased;line-height:1.6}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
ul{list-style:none}

:root{
  --blue:#2E6FD9; --blue-dark:#2459b3; --blue-deep:#1c4a96; --blue-pale:#eef4fd;
  --orange:#F38345; --ink:#111; --stone:#888; --mist:#ffffff; --border:#ececec; --radius:10px;
}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(255,255,255,.98);backdrop-filter:blur(10px);box-shadow:0 1px 0 var(--border);transition:box-shadow .3s}
#nav.scrolled-shadow{box-shadow:0 2px 14px rgba(0,0,0,.06)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:120px}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-full{height:120px;width:auto;max-height:120px;display:block}
.nav-links{display:flex;align-items:center;gap:1.75rem}
.nav-a{font-size:.9rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);transition:color .2s;position:relative}
.nav-a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--orange);transform:scaleX(0);transform-origin:left;transition:transform .25s}
.nav-a:hover{color:var(--orange)}
.nav-a:hover::after{transform:scaleX(1)}
.nav-a.current{color:var(--orange)}
.nav-a.current::after{transform:scaleX(1)}
.nav-cta{font-size:.9rem;font-weight:500;letter-spacing:.05em;color:#fff;background:var(--orange);border:none;border-radius:6px;padding:.45rem 1rem;transition:background .2s}
.nav-cta:hover{background:#d96a28}
#hamburger{display:none;background:none;border:none;padding:.3rem;color:var(--blue)}
#mobile-nav{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(255,255,255,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:1rem 1.5rem;flex-direction:column;gap:.25rem}
#mobile-nav.open{display:flex}
#mobile-nav .nav-a{color:var(--blue);padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
#mobile-nav .nav-a:last-of-type{border-bottom:none}
#mobile-nav .nav-cta{margin-top:.75rem;text-align:center;display:block;padding:.65rem 1rem}

.crumbs{max-width:1200px;margin:0 auto;padding:9rem 1.5rem 0;font-size:.75rem;color:var(--stone)}
.crumbs a{color:var(--blue)}
.crumbs a:hover{color:var(--orange)}

/* GALLERY */
.gallery{max-width:1200px;margin:1.25rem auto 0;padding:0 1.5rem;display:grid;grid-template-columns:2fr 1fr;gap:.6rem;height:380px}
.gallery-main{border-radius:var(--radius);overflow:hidden;background:linear-gradient(135deg,#c8d8f0,#a8c0e8);position:relative}
.gallery-main img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gallery-side{display:grid;grid-template-rows:1fr 1fr;gap:.6rem}
.gallery-thumb{border-radius:var(--radius);overflow:hidden;background:linear-gradient(135deg,#a8c0e8,#c8d8f0);position:relative}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
@media(max-width:760px){.gallery{grid-template-columns:1fr;height:auto}.gallery-main{height:260px}.gallery-side{display:none}}

/* LAYOUT */
.detail-wrap{max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem 5rem;display:grid;gap:2.5rem}
@media(min-width:900px){.detail-wrap{grid-template-columns:1.6fr 1fr;align-items:start}}

.tag-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.tag-chip{font-size:.65rem;font-weight:600;letter-spacing:.03em;padding:4px 11px;border-radius:999px;background:var(--blue-pale);color:var(--blue)}
.detail-title{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.5vw,2.4rem);font-weight:700;color:var(--blue);line-height:1.2;margin-bottom:1rem}
.detail-desc{font-size:.92rem;color:var(--stone);line-height:1.85;margin-bottom:2.25rem}

.block-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:1.1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}

/* ITINERARY */
.itinerary{display:flex;flex-direction:column;margin-bottom:2.5rem}
.itin-day{display:flex;gap:1.25rem;position:relative;padding-bottom:1.75rem}
.itin-day:last-child{padding-bottom:0}
.itin-day::before{content:'';position:absolute;left:17px;top:38px;bottom:0;width:1px;background:var(--border)}
.itin-day:last-child::before{display:none}
.itin-num{width:36px;height:36px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:.85rem;flex-shrink:0;z-index:1}
.itin-title{font-size:.92rem;font-weight:600;color:var(--ink);margin-bottom:.4rem}
.itin-text{font-size:.82rem;color:var(--stone);line-height:1.8}

/* INCLUDES / EXCLUDES */
.incl-grid{display:grid;gap:1.5rem;margin-bottom:2.5rem}
@media(min-width:560px){.incl-grid{grid-template-columns:1fr 1fr}}
.incl-list{display:flex;flex-direction:column;gap:.65rem}
.incl-item{display:flex;align-items:flex-start;gap:.6rem;font-size:.83rem;color:var(--ink)}
.incl-item svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
.incl-item.yes svg{stroke:#2a9d5c}
.incl-item.no{color:#999}
.incl-item.no svg{stroke:#d9534f}

/* BOOKING CARD (sticky) */
.booking-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;box-shadow:0 10px 34px rgba(10,66,165,.08)}
@media(min-width:900px){.booking-card{position:sticky;top:80px}}
.booking-price-label{font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--stone);margin-bottom:.3rem}
.booking-price{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--blue);margin-bottom:1.5rem}
.booking-price span{font-size:.7rem;font-weight:400;color:var(--stone);font-family:'Inter',sans-serif}
.bfield{margin-bottom:1rem}
.bfield label{display:block;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:.4rem}
.bfield input,.bfield select{width:100%;padding:.65rem .8rem;border:1px solid var(--border);border-radius:7px;font-size:.83rem;font-family:inherit;color:var(--ink);outline:none;transition:border-color .2s;background:#fff}
.bfield input:focus,.bfield select:focus{border-color:var(--blue)}
.booking-total{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:1rem;margin:1.25rem 0}
.booking-total-label{font-size:.78rem;color:var(--stone)}
.booking-total-value{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--ink)}
.btn-book{width:100%;background:var(--orange);color:#fff;border:none;border-radius:7px;padding:.85rem;font-size:.87rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s}
.btn-book:hover{background:#d96a28}
.booking-note{font-size:.66rem;color:var(--stone);text-align:center;margin-top:.75rem;line-height:1.6}

/* CTA STRIP */
.cta-strip{background:var(--blue-pale);padding:3.5rem 1.5rem;text-align:center}
.cta-strip h3{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--blue);margin-bottom:.6rem}
.cta-strip p{font-size:.85rem;color:var(--stone);margin-bottom:1.5rem}
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;background:var(--orange);color:#fff;border:none;border-radius:7px;padding:.7rem 1.5rem;font-size:.83rem;font-weight:500}
.btn-primary:hover{background:#d96a28}

footer{background:var(--blue-deep);padding:2rem 1.5rem}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
@media(min-width:640px){.footer-inner{flex-direction:row;align-items:center;justify-content:space-between}}
.footer-brand{font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.05em}
.footer-meta{font-size:.65rem;color:rgba(255,255,255,.3)}
.footer-links{display:flex;gap:1.25rem}
.footer-links a{font-size:.7rem;color:rgba(255,255,255,.4);transition:color .2s}
.footer-links a:hover{color:var(--orange)}

.not-found{max-width:600px;margin:8rem auto;text-align:center;padding:0 1.5rem}
.not-found h1{font-family:'Playfair Display',serif;color:var(--blue);margin-bottom:1rem}
.not-found p{color:var(--stone);margin-bottom:1.5rem}
</style>
</head>
<body>

<!-- NAV ──────────────────────────────────────────── -->
<nav id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Upupa Travel" class="logo-full"/>
    </a>    
    <div class="nav-links" id="nav-links" style="display:none">
      <a href="index.html" class="nav-a">Home</a>
      <a href="index.html#about" class="nav-a">About</a>
      <a href="tours.html" class="nav-a current">Tours</a>
      <a href="gallery.html" class="nav-a">Gallery</a>
      <a href="index.html#reviews" class="nav-a">Reviews</a>
      <a href="index.html#contact" class="nav-a">Contact</a>
      <a href="index.html#contact" class="nav-cta">Book a Call</a>
    </div>
    <button id="hamburger" onclick="toggleMobile()" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div id="mobile-nav">
    <a href="index.html" class="nav-a" onclick="closeMobile()">Home</a>
    <a href="index.html#about" class="nav-a" onclick="closeMobile()">About</a>
    <a href="tours.html" class="nav-a current" onclick="closeMobile()">Tours</a>
    <a href="gallery.html" class="nav-a" onclick="closeMobile()">Gallery</a>
    <a href="index.html#reviews" class="nav-a" onclick="closeMobile()">Reviews</a>
    <a href="index.html#contact" class="nav-a" onclick="closeMobile()">Contact</a>
    <a href="index.html#contact" class="nav-cta" onclick="closeMobile()">Book a Call</a>
  </div>
</nav>

<div id="page-content">
  <!-- filled by JS once the package is resolved -->
</div>

<footer>
  <div class="footer-inner">
    <div>
      <div class="footer-brand">UPUPA TRAVEL</div>
      <div class="footer-meta" style="margin-top:.3rem">© 2026 · Yerevan, Armenia</div>
    </div>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">TripAdvisor</a>
      <a href="#">Facebook</a>
    </div>
  </div>
</footer>

<script>
/* ── NAV ───────────────────────────────────────── */
const navEl = document.getElementById('nav');
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');
function setDesktopLinks(){
  navLinks.style.display = window.innerWidth >= 768 ? 'flex' : 'none';
  hamburger.style.display = window.innerWidth >= 768 ? 'none' : 'block';
}
setDesktopLinks();
window.addEventListener('resize', setDesktopLinks);
window.addEventListener('scroll', () => navEl.classList.toggle('scrolled-shadow', window.scrollY > 40), {passive:true});
function toggleMobile(){ document.getElementById('mobile-nav').classList.toggle('open'); }
function closeMobile(){ document.getElementById('mobile-nav').classList.remove('open'); }

/* ── PACKAGE DATA ──────────────────────────────
   📝 Keep the `slug` values identical to the ones in tours.html — that's
   how a card on the listing page finds its way to the right detail page.
   `basePrice` is AMD per adult. `hotelOptions` only matters for overnight
   trips — leave it as [] for day trips (the hotel field hides itself).
*/
const packages = {
  "garni-geghard-symphony-of-stones": {
    title: "Garni, Geghard & Symphony of Stones",
    duration: "Day Trip", nights: 0,
    image: "pkg-garni.jpg",
    tags: ["Day Trip", "Private Tour", "History & Culture"],
    desc: "A single, unhurried day through Armenia's Hellenistic temple, a monastery carved into the mountain, and the basalt column gorge locals call the Symphony of Stones.",
    itinerary: [
      {title:"Garni, Geghard & the Symphony of Stones", text:"Depart Yerevan in the morning for the Hellenistic temple of Garni, perched above the Azat River gorge. Continue to Geghard Monastery, partly carved into the cliff face and a UNESCO World Heritage Site, then stop at the basalt column formation known as the Symphony of Stones before returning to Yerevan by evening."}
    ],
    includes: ["Private transport & driver","English or Russian speaking guide","Hotel pickup & drop-off","All entrance fees"],
    excludes: ["Lunch","Personal expenses","Travel insurance"],
    basePrice: 35000,
    hotelOptions: []
  },
  "khor-virap-areni-noravank": {
    title: "Khor Virap, Areni Cave & Noravank",
    duration: "Day Trip", nights: 0,
    image: "pkg-khorvirap.jpg",
    tags: ["Day Trip", "Private Tour", "Wine & History"],
    desc: "Views of Mount Ararat from the monastery at its foot, a Bronze Age cave with the world's oldest known winery, and the red-cliff monastery of Noravank.",
    itinerary: [
      {title:"Khor Virap, Areni Cave & Noravank", text:"Start at Khor Virap Monastery for the closest possible view of Mount Ararat. Visit the Areni-1 cave complex, site of the oldest known winery in the world, followed by a tasting at a local winery. End the day at Noravank, a 13th-century monastery set into a dramatic red rock canyon."}
    ],
    includes: ["Private transport & driver","English or Russian speaking guide","Wine tasting","Lunch"],
    excludes: ["Personal expenses","Travel insurance"],
    basePrice: 38000,
    hotelOptions: []
  },
  "tatev-syunik-expedition": {
    title: "Tatev & Syunik South Expedition",
    duration: "2 Days / 1 Night", nights: 1,
    image: "pkg-tatev.jpg",
    tags: ["2 Days", "Private Tour", "Mountains"],
    desc: "The world's longest reversible cable car to Tatev Monastery, the Devil's Bridge hot springs, and an overnight in the mountain town of Goris.",
    itinerary: [
      {title:"Yerevan to Goris via Khndzoresk", text:"Drive south through the Vorotan Pass, stopping at the cliffside cave village of Old Khndzoresk. Ride the Wings of Tatev cable car across the canyon to Tatev Monastery. Overnight in Goris."},
      {title:"Devil's Bridge & return to Yerevan", text:"Visit the natural hot springs and rock formations at the Devil's Bridge before the scenic drive back to Yerevan, arriving in the evening."}
    ],
    includes: ["Private transport & driver","English or Russian speaking guide","Cable car tickets","1 night hotel accommodation","Breakfast"],
    excludes: ["Lunch & dinner","Personal expenses","Travel insurance"],
    basePrice: 96000,
    hotelOptions: [
      {label:"Standard Hotel", delta:0},
      {label:"Comfort Hotel", delta:15000},
      {label:"Deluxe Hotel", delta:35000}
    ]
  },
  "lake-sevan-dilijan-escape": {
    title: "Lake Sevan & Dilijan Escape",
    duration: "3 Days / 2 Nights", nights: 2,
    image: "pkg-sevan.jpg",
    tags: ["3 Days", "Private Tour", "Nature"],
    desc: "Armenia's mountain sea and the forested 'Little Switzerland' of Dilijan — monasteries, lakeside lunches, and slow mountain-town mornings.",
    itinerary: [
      {title:"Yerevan to Dilijan via Lake Sevan", text:"Visit Sevanavank Monastery on the shores of Lake Sevan before continuing to the forested town of Dilijan."},
      {title:"Dilijan Old Town & Parz Lake", text:"Explore Dilijan's restored old quarter, then hike or drive to Parz Lake and visit Goshavank Monastery."},
      {title:"Lake Sevan beach & return", text:"A relaxed morning by Lake Sevan before the drive back to Yerevan."}
    ],
    includes: ["Private transport & driver","English or Russian speaking guide","2 nights hotel accommodation","Breakfast"],
    excludes: ["Lunch & dinner","Personal expenses","Travel insurance"],
    basePrice: 128000,
    hotelOptions: [
      {label:"Standard Hotel", delta:0},
      {label:"Comfort Hotel", delta:18000},
      {label:"Deluxe Hotel", delta:42000}
    ]
  },
  "classic-armenia-in-5-days": {
    title: "Classic Armenia in 5 Days",
    duration: "5 Days / 4 Nights", nights: 4,
    image: "pkg-classic5.jpg",
    tags: ["5 Days", "Private Tour", "Best Seller"],
    desc: "The complete first-timer's route — Yerevan, Garni & Geghard, Khor Virap & Noravank, Tatev, and Lake Sevan — at a pace that never feels rushed.",
    itinerary: [
      {title:"Arrival & Yerevan City Tour", text:"Airport pickup and a relaxed walk through central Yerevan — the Cascade, Republic Square, and the Vernissage market."},
      {title:"Garni & Geghard", text:"The Hellenistic temple of Garni, the cliffside Geghard Monastery, and the Symphony of Stones basalt gorge."},
      {title:"Khor Virap & Noravank", text:"Mount Ararat views from Khor Virap, an Areni winery tasting, and the canyon monastery of Noravank."},
      {title:"Tatev Cable Car", text:"A full day south for the Wings of Tatev cable car and Tatev Monastery."},
      {title:"Lake Sevan & Departure", text:"A final morning at Lake Sevan before airport drop-off."}
    ],
    includes: ["Airport pickup & drop-off","Private transport & driver","English or Russian speaking guide","4 nights hotel accommodation","Breakfast daily"],
    excludes: ["Lunch & dinner (except where noted)","Personal expenses","Travel insurance"],
    basePrice: 210000,
    hotelOptions: [
      {label:"Standard Hotel", delta:0},
      {label:"Comfort Hotel", delta:28000},
      {label:"Deluxe Hotel", delta:65000}
    ]
  },
  "northern-armenia-heritage-trail": {
    title: "Northern Armenia Heritage Trail",
    duration: "4 Days / 3 Nights", nights: 3,
    image: "pkg-north.jpg",
    tags: ["4 Days", "Private Tour", "Off the Beaten Path"],
    desc: "Haghpat and Sanahin monasteries, the Debed Canyon, and the Soviet-era Alaverdi copper town — Armenia's north at its best, without the crowds.",
    itinerary: [
      {title:"Yerevan to Debed Canyon", text:"Drive north into the Debed Canyon, stopping at scenic overlooks along the way."},
      {title:"Haghpat & Sanahin Monasteries", text:"Two UNESCO World Heritage monastery complexes, both still active, set on either side of the canyon."},
      {title:"Alaverdi & Odzun", text:"The Soviet-era copper town of Alaverdi and the hilltop 5th-century church of Odzun."},
      {title:"Return to Yerevan", text:"A final scenic drive back south, arriving in the afternoon."}
    ],
    includes: ["Private transport & driver","English or Russian speaking guide","3 nights hotel accommodation","Breakfast daily"],
    excludes: ["Lunch & dinner","Personal expenses","Travel insurance"],
    basePrice: 142000,
    hotelOptions: [
      {label:"Standard Hotel", delta:0},
      {label:"Comfort Hotel", delta:20000},
      {label:"Deluxe Hotel", delta:48000}
    ]
  }
};

const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const xIcon = '<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

const params = new URLSearchParams(window.location.search);
const slug = params.get('package');
const pkg = slug ? packages[slug] : null;

function fmtAMD(n){ return n.toLocaleString('en-US') + ' AMD'; }

function render(){
  const root = document.getElementById('page-content');

  if(!pkg){
    root.innerHTML = `
      <div class="not-found">
        <h1>Package Not Found</h1>
        <p>We couldn't find that tour package. It may have been renamed or removed.</p>
        <a href="tours.html" class="btn-primary">Back to All Packages</a>
      </div>`;
    document.title = "Tour Package Not Found — Upupa Travel";
    return;
  }

  document.title = pkg.title + " — Upupa Travel";

  const tagsHtml = pkg.tags.map(t => `<span class="tag-chip">${t}</span>`).join('');

  const itinHtml = pkg.itinerary.map((d,i) => `
    <div class="itin-day">
      <div class="itin-num">${i+1}</div>
      <div>
        <div class="itin-title">${d.title}</div>
        <p class="itin-text">${d.text}</p>
      </div>
    </div>`).join('');

  const includesHtml = pkg.includes.map(x => `<div class="incl-item yes">${checkIcon}<span>${x}</span></div>`).join('');
  const excludesHtml = pkg.excludes.map(x => `<div class="incl-item no">${xIcon}<span>${x}</span></div>`).join('');

  const hotelFieldHtml = pkg.hotelOptions.length ? `
    <div class="bfield">
      <label for="b-hotel">Hotel Category</label>
      <select id="b-hotel" onchange="updateTotal()">
        ${pkg.hotelOptions.map((h,i) => `<option value="${i}">${h.label}${h.delta ? ' (+' + fmtAMD(h.delta) + ')' : ''}</option>`).join('')}
      </select>
    </div>` : '';

  root.innerHTML = `
    <div class="crumbs"><a href="index.html">Home</a> &nbsp;›&nbsp; <a href="tours.html">Tour Packages</a> &nbsp;›&nbsp; ${pkg.title}</div>

    <div class="gallery">
      <div class="gallery-main"><img src="${pkg.image}" alt="${pkg.title}" onerror="this.style.display='none'"/></div>
      <div class="gallery-side">
        <div class="gallery-thumb"><img src="${pkg.image}" alt="" onerror="this.style.display='none'"/></div>
        <div class="gallery-thumb"><img src="${pkg.image}" alt="" onerror="this.style.display='none'"/></div>
      </div>
    </div>

    <div class="detail-wrap">
      <div>
        <div class="tag-row">${tagsHtml}</div>
        <h1 class="detail-title">${pkg.title}</h1>
        <p class="detail-desc">${pkg.desc}</p>

        <div class="block-title">Itinerary</div>
        <div class="itinerary">${itinHtml}</div>

        <div class="block-title">What's Included</div>
        <div class="incl-grid">
          <div class="incl-list">${includesHtml}</div>
          <div class="incl-list">${excludesHtml}</div>
        </div>
      </div>

      <div class="booking-card">
        <div class="booking-price-label">Starting from</div>
        <div class="booking-price">${fmtAMD(pkg.basePrice)} <span>per person</span></div>

        <div class="bfield">
          <label for="b-date">Arrival Date</label>
          <input id="b-date" type="date"/>
        </div>
        <div class="bfield">
          <label for="b-adults">Number of Adults</label>
          <select id="b-adults" onchange="updateTotal()">
            <option value="1">1 Adult</option>
            <option value="2" selected>2 Adults</option>
            <option value="3">3 Adults</option>
            <option value="4">4 Adults</option>
            <option value="5">5 Adults</option>
            <option value="6">6 Adults</option>
          </select>
        </div>
        ${hotelFieldHtml}

        <div class="booking-total">
          <div class="booking-total-label">Estimated Total</div>
          <div class="booking-total-value" id="b-total">${fmtAMD(pkg.basePrice * 2)}</div>
        </div>

        <button class="btn-book" onclick="bookNow()">
          Book This Package
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <p class="booking-note">No payment now. We'll confirm availability and finalize pricing by email or WhatsApp.</p>
      </div>
    </div>

    <div class="cta-strip">
      <h3>Want this tailored to you?</h3>
      <p>Different dates, group size, or a mix of packages — just tell us what you have in mind.</p>
      <a href="index.html#contact" class="btn-primary">
        Contact Us
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  `;
}

function updateTotal(){
  const adults = parseInt(document.getElementById('b-adults').value, 10);
  let total = pkg.basePrice * adults;
  const hotelSelect = document.getElementById('b-hotel');
  if(hotelSelect && pkg.hotelOptions.length){
    const delta = pkg.hotelOptions[parseInt(hotelSelect.value, 10)].delta;
    total += delta * adults;
  }
  document.getElementById('b-total').textContent = fmtAMD(total);
}

function bookNow(){
  const date = document.getElementById('b-date').value;
  const adults = document.getElementById('b-adults').value;
  const hotelSelect = document.getElementById('b-hotel');
  const hotel = hotelSelect ? pkg.hotelOptions[parseInt(hotelSelect.value,10)].label : '';
  const q = new URLSearchParams({ tour: pkg.title, date: date || '', adults, hotel });
  window.location.href = 'index.html?' + q.toString() + '#contact';
}

render();
</script>
</body>
</html>
